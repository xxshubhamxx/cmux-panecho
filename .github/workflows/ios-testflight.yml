name: iOS TestFlight (beta)

on:
  # No push trigger. A TestFlight upload is a release action: you only ever want
  # the LATEST main state in beta, exactly once per change, never one upload per
  # commit. Triggering on every iOS-affecting push forced a concurrency group to
  # dedup concurrent uploads, and GitHub cancels the superseded *pending* runs in
  # that group during merge bursts; those cancelled runs surface as red checks on
  # the intermediate main commits, making main look like CI is failing. The
  # schedule below already SHA-compares HEAD to the last uploaded commit (the
  # `decide` job), which is the correct primitive for a beta lane: it uploads the
  # current main only when it has actually advanced, and skips (green) otherwise.
  # For an immediate beta, use workflow_dispatch; intentional cuts go through the
  # release flow. See nightly.yml for the rolling dogfood lane.
  workflow_dispatch:
    inputs:
      build_number:
        description: CFBundleVersion to stamp (defaults to UTC yyyyMMddHHmmss)
        required: false
        default: ""
      force:
        # Manual (workflow_dispatch) runs always upload, so this only documents
        # intent. It exists so the no-new-commits skip can be bypassed if the
        # 24h commit-window check is ever extended to dispatch runs.
        description: Force an upload (manual runs already always upload)
        required: false
        default: false
        type: boolean
  schedule:
    # Every ~2h (at :17 to stay off the top-of-hour rush). The decide job skips a
    # run only when the current main HEAD was already uploaded by a prior
    # successful run (SHA compare, not a wall-clock window), so an iOS-affecting
    # change reaches internal TestFlight within ~2h of landing on main, and a
    # failed or missed run retries the not-yet-uploaded commit instead of
    # permanently stranding it.
    #
    # Why ~2h and not a push trigger / per-commit: a per-push lane needs either a
    # shared concurrency group (which cancels superseded pending runs into red
    # checks) or per-SHA concurrency (which removes the serialization that keeps
    # parallel archives from racing on the timestamp build number). ~2h spacing
    # keeps runs from overlapping (an archive+upload takes ~30-60m), so this
    # single per-ref lane stays serialized and uploads never collide. If faster
    # turnaround is ever needed, tighten the interval (still > one archive's
    # duration) rather than adding a push trigger.
    - cron: "17 */2 * * *"

concurrency:
  group: ios-testflight-${{ github.ref_name }}
  # Queue concurrent runs instead of canceling them so no upload is lost.
  cancel-in-progress: false

permissions:
  contents: read
  # decide reads this workflow's prior run history to find the last uploaded SHA.
  actions: read

jobs:
  decide:
    name: Decide whether a TestFlight upload is needed
    runs-on: ${{ vars.LINUX_RUNNER || 'warp-ubuntu-latest-x64-4x' }}
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Decide whether a TestFlight upload is needed
        id: decide
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true' && 'true' || 'false' }}
        with:
          script: |
            const forceBuild = process.env.FORCE_BUILD === 'true';
            const { owner, repo } = context.repo;

            // workflow_dispatch always builds (the operator asked for it).
            // Scheduled runs build unless the current commit has ALREADY been
            // uploaded by a prior successful run. We compare HEAD to the head_sha
            // of the most recent successful run of this workflow, not a wall-clock
            // window: a failed or missed nightly leaves the last success on an
            // older SHA, so the next run retries the un-uploaded commit instead of
            // stranding it. A successful run either uploaded HEAD or correctly
            // skipped an already-uploaded HEAD, so its head_sha is always an
            // uploaded commit.
            let needsBuild = true;
            let lastUploadedSha = null;
            if (!forceBuild && context.eventName === 'schedule') {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'ios-testflight.yml',
                status: 'success',
                per_page: 1,
              });
              lastUploadedSha = runs.data.workflow_runs[0]?.head_sha ?? null;
              needsBuild = lastUploadedSha !== context.sha;
            }

            const shouldBuild = forceBuild || context.eventName === 'workflow_dispatch' || needsBuild;
            core.setOutput('should_build', shouldBuild ? 'true' : 'false');
            core.summary
              .addHeading('iOS TestFlight upload decision')
              .addTable([
                [{ data: 'event', header: true }, context.eventName],
                [{ data: 'force', header: true }, String(forceBuild)],
                [{ data: 'head sha', header: true }, context.sha],
                [{ data: 'last uploaded sha (schedule only)', header: true }, String(lastUploadedSha)],
                [{ data: 'should build', header: true }, String(shouldBuild)],
              ])
              .write();

  upload:
    name: Upload to TestFlight
    needs: decide
    # Only ever publish from main. push/schedule always run on main; this also
    # blocks publishing arbitrary code by dispatching the workflow against a
    # feature branch (the ASC secrets are only meant to ship reviewed main).
    if: needs.decide.outputs.should_build == 'true' && github.ref == 'refs/heads/main'
    runs-on: ${{ vars.MACOS_RUNNER_IOS || 'blacksmith-6vcpu-macos-26' }}
    timeout-minutes: 60
    env:
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' -print 2>/dev/null | sort | tail -n 1 || true)"
            if [ -z "$XCODE_APP" ]; then
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
            XCODE_DIR="$XCODE_APP/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Install zig
        run: ./scripts/install-zig-ci.sh

      - name: Provision GhosttyKit
        run: |
          # Downloads the prebuilt GhosttyKit.xcframework pinned in
          # scripts/ghosttykit-checksums.txt for the current ghostty SHA, or
          # falls back to a from-source build. The iOS app links GhosttyKit via
          # a local-path binaryTarget, so it must exist before package resolve.
          ./scripts/ensure-ghosttykit.sh

      - name: Materialize App Store Connect API key
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_API_KEY_ID:-}" ] || [ -z "${ASC_API_ISSUER_ID:-}" ] || [ -z "${ASC_API_KEY_P8_BASE64:-}" ]; then
            echo "Missing one of ASC_API_KEY_ID / ASC_API_ISSUER_ID / ASC_API_KEY_P8_BASE64 secrets" >&2
            exit 1
          fi
          # xcodebuild -allowProvisioningUpdates and altool both look for the key
          # under ~/.appstoreconnect/private_keys/AuthKey_<KEY_ID>.p8.
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$KEY_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          mkdir -p "$KEY_DIR"
          # Decode without echoing the key contents to the log.
          printf '%s' "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          # Write the expanded path ($HOME, not ~) so later steps can read it.
          echo "ASC_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Import iOS distribution signing cert
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_DISTRIBUTION_CERTIFICATE_BASE64:-}" ]; then
            echo "Missing IOS_DISTRIBUTION_CERTIFICATE_BASE64 secret" >&2
            exit 1
          fi
          if [ -z "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing IOS_DISTRIBUTION_CERTIFICATE_PASSWORD secret" >&2
            exit 1
          fi

          KEYCHAIN_PASSWORD="$(uuidgen)"
          KEYCHAIN_NAME="ios-testflight.keychain"
          CERT_PATH="$RUNNER_TEMP/ios-distribution.p12"
          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security delete-keychain "$KEYCHAIN_NAME" >/dev/null 2>&1 || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import "$CERT_PATH" -k "$KEYCHAIN_NAME" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME"
          security find-identity -v -p codesigning "$KEYCHAIN_NAME"
          IOS_DISTRIBUTION_IDENTITY="$(
            security find-identity -v -p codesigning "$KEYCHAIN_NAME" |
              sed -n 's/.*"\(Apple Distribution: .* (7WLXT3NR37)\)".*/\1/p' |
              head -n 1
          )"
          if [ -z "$IOS_DISTRIBUTION_IDENTITY" ]; then
            echo "No Apple Distribution identity for team 7WLXT3NR37 was found in the imported certificate" >&2
            exit 1
          fi
          echo "IOS_DISTRIBUTION_IDENTITY=$IOS_DISTRIBUTION_IDENTITY" >> "$GITHUB_ENV"
          echo "Using iOS distribution identity: $IOS_DISTRIBUTION_IDENTITY"

      - name: Install beta provisioning profile
        env:
          IOS_BETA_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_BETA_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_BETA_PROVISIONING_PROFILE_BASE64:-}" ]; then
            echo "Missing IOS_BETA_PROVISIONING_PROFILE_BASE64 secret" >&2
            exit 1
          fi

          TMP_PROFILE="$RUNNER_TEMP/cmux-beta.mobileprovision"
          TMP_PLIST="$RUNNER_TEMP/cmux-beta-profile.plist"
          printf '%s' "$IOS_BETA_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$TMP_PROFILE"
          security cms -D -i "$TMP_PROFILE" > "$TMP_PLIST"

          APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$TMP_PLIST")"
          if [ "$APP_ID" != "7WLXT3NR37.dev.cmux.app.beta" ]; then
            echo "Beta provisioning profile targets unexpected app ID: $APP_ID" >&2
            exit 1
          fi
          APS_ENVIRONMENT="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:aps-environment" "$TMP_PLIST")"
          if [ "$APS_ENVIRONMENT" != "production" ]; then
            echo "Beta provisioning profile aps-environment is '$APS_ENVIRONMENT', expected 'production'" >&2
            exit 1
          fi
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :Name" "$TMP_PLIST")"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c "Print :UUID" "$TMP_PLIST")"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$TMP_PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "IOS_BETA_PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed beta provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Archive, export, and upload to TestFlight
        id: upload
        env:
          # Only set for manual workflow_dispatch with an explicit build number.
          # For push/schedule this is empty and the script generates a monotonic
          # 14-digit UTC timestamp itself (single source of the numbering scheme,
          # so the workflow can't drift from it the way it did before). An empty
          # value here means "let the script decide", which also keeps the guard's
          # fail-open path (generated timestamps are monotonic by construction;
          # explicit values fail closed when App Store Connect can't be reached).
          INPUT_BUILD_NUMBER: ${{ github.event.inputs.build_number }}
          # The script writes the CFBundleVersion that actually shipped here (the
          # monotonic guard may bump it), so the summary reports the real value.
          CMUX_BUILD_NUMBER_OUT_FILE: ${{ runner.temp }}/cmux-final-build-number.txt
        run: |
          set -euo pipefail
          ARGS=(--lane beta --signing manual)
          if [ -n "${INPUT_BUILD_NUMBER:-}" ]; then
            ARGS+=(--build-number "$INPUT_BUILD_NUMBER")
          fi
          ./ios/scripts/upload-testflight.sh "${ARGS[@]}"
          if [ -f "$CMUX_BUILD_NUMBER_OUT_FILE" ]; then
            FINAL_BN="$(cat "$CMUX_BUILD_NUMBER_OUT_FILE")"
          else
            FINAL_BN="${INPUT_BUILD_NUMBER:-unknown}"
          fi
          echo "final_build_number=$FINAL_BN" >> "$GITHUB_OUTPUT"
          echo "Shipped CFBundleVersion: $FINAL_BN"

      - name: Summary
        if: always()
        env:
          BUILD_NUMBER: ${{ steps.upload.outputs.final_build_number || github.event.inputs.build_number || 'unknown' }}
        run: |
          {
            echo "### iOS TestFlight upload"
            echo
            echo "- lane: \`beta\` (bundle id \`dev.cmux.app.beta\`)"
            echo "- signing: manual (CI-imported iOS distribution cert + beta profile)"
            echo "- build number (CFBundleVersion): \`${BUILD_NUMBER}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain ios-testflight.keychain >/dev/null 2>&1 || true
