name: E2E test with video recording
run-name: ${{ inputs.test_filter }} on ${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner }} @ ${{ inputs.ref || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      test_filter:
        description: "Test class or class/method; optionally target-qualified as cmuxUITests/Class or cmuxTests/Class"
        required: true
      test_timeout:
        description: "Per-test timeout in seconds"
        required: false
        default: "120"
      job_timeout:
        description: "Job timeout in minutes (cold builds on 6-vcpu runners can exceed the 20-minute default)"
        required: false
        default: "20"
      record_video:
        description: Record the virtual display during UI tests
        required: false
        default: true
        type: boolean
      runner:
        description: "Runner OS (auto follows MACOS_RUNNER_15; tart-* choices use isolated VMs)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - blacksmith-6vcpu-macos-15
          - blacksmith-6vcpu-macos-26
          - blacksmith-6vcpu-macos-latest
          - warp-macos-15-arm64-6x
          - depot-macos-latest
          - depot-macos-14
          - tart-canary
          - tart-dual
          - tart-small

concurrency:
  group: e2e-${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner }}-${{ inputs.ref || github.ref_name }}-${{ inputs.test_filter }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner }}
    timeout-minutes: ${{ fromJSON(inputs.job_timeout || '20') }}
    env:
      TEST_REF: ${{ inputs.ref || github.ref }}
    steps:
      - name: Validate Depot runner identity
        if: ${{ startsWith((!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner, 'depot-macos-') }}
        env:
          REQUESTED_RUNNER: ${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner }}
          RUNNER_CONTEXT_NAME: ${{ runner.name }}
        run: |
          set -euo pipefail
          echo "Requested runner: $REQUESTED_RUNNER"
          case "$RUNNER_CONTEXT_NAME" in
            depot-*)
              echo "Resolved runner matches depot-*? yes"
              ;;
            *)
              echo "Resolved runner matches depot-*? no"
              echo "::error::$REQUESTED_RUNNER resolved outside Depot. Remove $REQUESTED_RUNNER from non-Depot self-hosted runners or choose an explicit runner."
              exit 1
              ;;
          esac

      - name: Validate Tart canary identity
        if: ${{ startsWith((!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner, 'tart-') }}
        env:
          REQUESTED_RUNNER: ${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner }}
          RUNNER_CONTEXT_NAME: ${{ runner.name }}
        run: |
          set -euo pipefail
          case "$RUNNER_CONTEXT_NAME" in
            tart-cmux-*) ;;
            *)
              echo "::error::$REQUESTED_RUNNER resolved to unexpected runner $RUNNER_CONTEXT_NAME"
              exit 1
              ;;
          esac
          test -f /etc/cmux-tart-ci || {
            echo "::error::$REQUESTED_RUNNER runner is missing the immutable VM identity marker"
            exit 1
          }

      - name: Clear stale git locks (self-hosted reused workspace)
        shell: bash
        run: |
          # Self-hosted macOS runners reuse the workspace. A job cancelled or
          # killed mid-checkout can leave a stale .git/modules/*/index.lock that
          # fails every later submodule checkout (e.g. ghostty). Clear them first.
          ws="${GITHUB_WORKSPACE:-$PWD}"
          rm -f "$ws/.git/index.lock" 2>/dev/null || true
          if [ -d "$ws/.git/modules" ]; then
            find "$ws/.git/modules" -type f -name "*.lock" -delete 2>/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Capture SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Normalize test filter
        id: filter
        env:
          TEST_FILTER_INPUT: ${{ inputs.test_filter }}
          RECORD_VIDEO_INPUT: ${{ inputs.record_video }}
        run: |
          set -euo pipefail
          raw_filter="$TEST_FILTER_INPUT"
          if [ -z "$raw_filter" ]; then
            echo "::error::test_filter must not be empty"
            exit 1
          fi

          case "$raw_filter" in
            cmuxTests/*)
              test_target="cmuxTests"
              normalized_filter="${raw_filter#cmuxTests/}"
              ;;
            cmuxUITests/*)
              test_target="cmuxUITests"
              normalized_filter="${raw_filter#cmuxUITests/}"
              ;;
            *)
              # Back-compat: bare Class or Class/method continues to target UI tests.
              test_target="cmuxUITests"
              normalized_filter="$raw_filter"
              ;;
          esac

          if [ -z "$normalized_filter" ]; then
            echo "::error::test_filter '$raw_filter' is missing a class or class/method after '$test_target/'"
            exit 1
          fi

          case "$normalized_filter" in
            /*|*//*)
              echo "::error::test_filter '$raw_filter' is not a valid class or class/method selector"
              exit 1
              ;;
          esac

          test_selector="$test_target/$normalized_filter"
          record_video_effective="false"
          if [ "$test_target" = "cmuxUITests" ] && [ "$RECORD_VIDEO_INPUT" = "true" ]; then
            record_video_effective="true"
          fi

          {
            echo "target=$test_target"
            echo "filter=$normalized_filter"
            echo "selector=$test_selector"
            echo "record_video=$record_video_effective"
          } >> "$GITHUB_OUTPUT"

          echo "Requested filter: $raw_filter"
          echo "Resolved target: $test_target"
          echo "Resolved selector: $test_selector"

      - name: Select Xcode
        run: |
          set -euo pipefail
          ./scripts/select-ci-xcode.sh

      - name: Download pre-built GhosttyKit.xcframework
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GHOSTTY_SHA=$(git -C ghostty rev-parse HEAD)
          BUILD_FLAVOR="crashsubdir-cmux-crash-v1"
          TAG="xcframework-$GHOSTTY_SHA-$BUILD_FLAVOR"
          URL="https://github.com/manaflow-ai/ghostty/releases/download/$TAG/GhosttyKit.xcframework.tar.gz"
          echo "Downloading xcframework for ghostty $GHOSTTY_SHA"
          MAX_RETRIES=30
          RETRY_DELAY=20
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -fSL -o GhosttyKit.xcframework.tar.gz "$URL"; then
              echo "Download succeeded on attempt $i"
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Failed to download xcframework after $MAX_RETRIES attempts" >&2
              exit 1
            fi
            echo "Attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          tar xzf GhosttyKit.xcframework.tar.gz
          rm GhosttyKit.xcframework.tar.gz
          test -d GhosttyKit.xcframework

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Install Bun for Feed sidebar tests
        if: ${{ steps.filter.outputs.target == 'cmuxUITests' && (steps.filter.outputs.filter == 'FeedSidebarUITests' || startsWith(steps.filter.outputs.filter, 'FeedSidebarUITests/')) }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Create virtual display
        if: ${{ steps.filter.outputs.target == 'cmuxUITests' && steps.filter.outputs.filter != 'DisplayResolutionRegressionUITests' }}
        run: |
          set -euo pipefail
          echo "=== Display before ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(none)"
          echo ""
          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          VDISPLAY_READY="$RUNNER_TEMP/cmux-virtual-display.ready"
          VDISPLAY_ID_PATH="$RUNNER_TEMP/cmux-virtual-display.id"
          VDISPLAY_LOG="$RUNNER_TEMP/cmux-virtual-display.log"
          rm -f "$VDISPLAY_READY" "$VDISPLAY_ID_PATH" "$VDISPLAY_LOG"

          /tmp/create-virtual-display \
            --ready-path "$VDISPLAY_READY" \
            --display-id-path "$VDISPLAY_ID_PATH" \
            >"$VDISPLAY_LOG" 2>&1 &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"

          for _ in $(seq 1 100); do
            if [ -s "$VDISPLAY_READY" ] && [ -s "$VDISPLAY_ID_PATH" ]; then
              break
            fi
            if ! kill -0 "$VDISPLAY_PID" 2>/dev/null; then
              echo "Virtual display helper exited before readiness" >&2
              cat "$VDISPLAY_LOG" >&2 || true
              exit 1
            fi
            sleep 0.1
          done
          if [ ! -s "$VDISPLAY_READY" ] || [ ! -s "$VDISPLAY_ID_PATH" ]; then
            echo "Timed out waiting for virtual display readiness" >&2
            cat "$VDISPLAY_LOG" >&2 || true
            exit 1
          fi
          echo "Virtual display ready: $(tr -d '\n' < "$VDISPLAY_ID_PATH")"
          cat "$VDISPLAY_LOG"
          echo "=== Display after ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(none)"

      - name: Install tmux
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            brew install --quiet tmux
          fi
          tmux -V

      - name: Install ffmpeg
        if: ${{ steps.filter.outputs.record_video == 'true' }}
        run: |
          brew install --quiet ffmpeg
          FFMPEG_PATH=$(which ffmpeg)
          echo "ffmpeg: $FFMPEG_PATH"
          ffmpeg -version | head -1
          echo "FFMPEG_PATH=$FFMPEG_PATH" >> "$GITHUB_ENV"

      - name: Grant TCC screen recording permission
        if: ${{ steps.filter.outputs.record_video == 'true' }}
        run: |
          FFMPEG_BIN="${FFMPEG_PATH:-/opt/homebrew/bin/ffmpeg}"

          # System-level TCC database (where kTCCServiceScreenCapture lives)
          SYS_TCC="/Library/Application Support/com.apple.TCC/TCC.db"
          if [ -f "$SYS_TCC" ]; then
            echo "Granting screen capture in system TCC database"
            for client in "$FFMPEG_BIN" /opt/homebrew/bin/ffmpeg /usr/local/bin/ffmpeg /usr/sbin/screencapture; do
              sudo sqlite3 "$SYS_TCC" \
                "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, csreq, policy_id, indirect_object_identifier_type, indirect_object_identifier, indirect_object_code_identity, flags, last_modified) VALUES ('kTCCServiceScreenCapture', '$client', 1, 2, 4, 1, NULL, NULL, 0, 'UNUSED', NULL, 0, $(date +%s));" 2>&1 || echo "  (failed for $client)"
            done
          fi

          # User-level TCC database (fallback)
          USER_TCC="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          if [ -f "$USER_TCC" ]; then
            echo "Granting screen capture in user TCC database"
            for client in "$FFMPEG_BIN" /opt/homebrew/bin/ffmpeg /usr/local/bin/ffmpeg; do
              sqlite3 "$USER_TCC" \
                "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, csreq, policy_id, indirect_object_identifier_type, indirect_object_identifier, indirect_object_code_identity, flags, last_modified) VALUES ('kTCCServiceScreenCapture', '$client', 1, 2, 4, 1, NULL, NULL, 0, 'UNUSED', NULL, 0, $(date +%s));" 2>&1 || echo "  (failed for $client)"
            done
          fi

          # Suppress Sequoia's ScreenCaptureApprovals prompt by pre-dating approval
          APPROVALS_PLIST="$HOME/Library/Group Containers/group.com.apple.replayd/ScreenCaptureApprovals.plist"
          if [ -d "$(dirname "$APPROVALS_PLIST")" ]; then
            echo "Pre-dating ScreenCaptureApprovals"
            # Set approval date far in the future so the monthly prompt never fires
            defaults write "$APPROVALS_PLIST" "$FFMPEG_BIN" -date "3000-01-01T00:00:00Z" 2>&1 || echo "  (failed)"
          fi

      - name: Prepare isolated DerivedData
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="${RUNNER_TEMP}/cmux-derived-data-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$DERIVED_DATA_PATH"
          mkdir -p "$DERIVED_DATA_PATH"
          echo "CMUX_DERIVED_DATA_PATH=$DERIVED_DATA_PATH" >> "$GITHUB_ENV"

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner }}-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15') || inputs.runner }}-

      - name: Sanitize Swift package cache
        run: python3 scripts/ci/sanitize-xcode-source-packages-cache.py .ci-source-packages

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"
          for attempt in 1 2 3; do
            if xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -derivedDataPath "$CMUX_DERIVED_DATA_PATH" \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              # Guard against a stale/poisoned Swift-package cache: resolve can
              # report success without binary artifacts materialized.
              if [ -d "$SOURCE_PACKAGES_DIR/artifacts/sparkle/Sparkle/Sparkle.xcframework" ] && [ -d "$SOURCE_PACKAGES_DIR/artifacts/sentry-cocoa/Sentry/Sentry.xcframework" ]; then
                exit 0
              fi
              echo "Resolve succeeded but binary artifacts are missing (stale cache); clearing and retrying" >&2
              rm -rf "$SOURCE_PACKAGES_DIR"
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run selected tests
        id: tests
        env:
          TEST_FILTER: ${{ inputs.test_filter }}
          TEST_TARGET: ${{ steps.filter.outputs.target }}
          TEST_SELECTOR: ${{ steps.filter.outputs.selector }}
          NORMALIZED_FILTER: ${{ steps.filter.outputs.filter }}
          TEST_TIMEOUT: ${{ inputs.test_timeout || '120' }}
          RECORD_VIDEO: ${{ steps.filter.outputs.record_video }}
          # App-host crash recovery must not stall on interactive backtraces
          # (mirrors ci.yml's tests job hardening).
          SWIFT_BACKTRACE: "interactive=no,timeout=0s,symbolicate=off,color=no"
          CMUX_XCODEBUILD_NONINTERACTIVE_POST_TEST_TIMEOUT_SECONDS: "45"
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          ONLY_TESTING="-only-testing:$TEST_SELECTOR"
          DISPLAY_ENV_PREFIX=()

          if [ "$TEST_TARGET" = "cmuxUITests" ] && [ "$NORMALIZED_FILTER" = "DisplayResolutionRegressionUITests" ]; then
            HELPER_PATH="/tmp/create-virtual-display"
            MANIFEST_PATH="/tmp/cmux-ui-test-display-harness.json"

            rm -f "$MANIFEST_PATH"
            trap 'rm -f "$MANIFEST_PATH"' EXIT

            clang -framework Foundation -framework CoreGraphics \
              -o "$HELPER_PATH" scripts/create-virtual-display.m

            printf '%s\n' "{\"helperBinaryPath\":\"$HELPER_PATH\"}" > "$MANIFEST_PATH"
          fi

          # Start recording right before the test (after build/resolve).
          # The display churn regression creates its own virtual display above,
          # so recording must start after that harness is ready.
          if [ "$RECORD_VIDEO" = "true" ]; then
            # A persistent AVFoundation capture session prevents
            # XCUIApplication from foregrounding a macOS app on both Warp and
            # Tart. Capture independent JPEG frames instead, then assemble
            # them after XCTest exits. No recorder owns the display while the
            # app is activating.
            GUI_USER="$(stat -f %Su /dev/console 2>/dev/null || true)"
            if [ -z "$GUI_USER" ] || [ "$GUI_USER" = "root" ]; then
              echo "::error::No logged-in GUI user is available for screen recording"
              exit 1
            fi
            GUI_UID="$(id -u "$GUI_USER")"
            FRAME_DIR=/tmp/test-recording-frames
            rm -rf "$FRAME_DIR"
            mkdir -p "$FRAME_DIR"
            (
              frame=0
              while true; do
                output="$(printf '%s/frame-%06d.jpg' "$FRAME_DIR" "$frame")"
                sudo -n launchctl asuser "$GUI_UID" sudo -n -H -u "$GUI_USER" \
                  /usr/sbin/screencapture -x -t jpg -D 1 "$output" || exit 1
                frame=$((frame + 1))
                sleep 0.5
              done
            ) </dev/null >/tmp/screencapture.log 2>&1 &
            RECORD_PID=$!
            echo "RECORD_PID=$RECORD_PID" >> "$GITHUB_ENV"
            sleep 2

            if kill -0 "$RECORD_PID" 2>/dev/null && [ -s "$FRAME_DIR/frame-000000.jpg" ]; then
              echo "Frame capture started (PID $RECORD_PID)"
            else
              echo "::error::screen frame capture failed to start"
              cat /tmp/screencapture.log
              exit 1
            fi
          fi

          XCODEBUILD_ENV=(
            "DEVELOPER_DIR=$DEVELOPER_DIR"
            "PATH=$PATH"
            "HOME=$HOME"
            "USER=$USER"
            "LOGNAME=${LOGNAME:-$USER}"
            "CI=${CI:-true}"
            "GITHUB_ACTIONS=${GITHUB_ACTIONS:-true}"
            "GITHUB_WORKSPACE=${GITHUB_WORKSPACE:-$PWD}"
            "RUNNER_TEMP=${RUNNER_TEMP:-}"
            "TMPDIR=${TMPDIR:-/tmp}"
          )
          if [ "${#DISPLAY_ENV_PREFIX[@]}" -gt 0 ]; then
            XCODEBUILD_ENV+=("${DISPLAY_ENV_PREFIX[@]}")
          fi

          RUN_XCODEBUILD=(env "${XCODEBUILD_ENV[@]}")
          if [ "$TEST_TARGET" = "cmuxUITests" ]; then
            CURRENT_USER="$(id -un)"
            GUI_USER="$(stat -f %Su /dev/console 2>/dev/null || true)"
            if [ -n "$GUI_USER" ] && [ "$GUI_USER" != "root" ] && GUI_UID="$(id -u "$GUI_USER" 2>/dev/null)"; then
              echo "Console GUI user: $GUI_USER ($GUI_UID); current user: $CURRENT_USER"
              if command -v automationmodetool >/dev/null 2>&1; then
                sudo -n automationmodetool enable-automationmode-without-authentication \
                  || echo "::warning::Could not enable Automation Mode"
              fi

              if sudo -n true 2>/dev/null; then
                RUN_XCODEBUILD=(
                  sudo -n launchctl asuser "$GUI_UID"
                  sudo -n -H -u "$GUI_USER" /usr/bin/env "${XCODEBUILD_ENV[@]}"
                )
                echo "Running xcodebuild in console user's GUI bootstrap"
              else
                echo "::warning::Passwordless sudo unavailable; running xcodebuild in current bootstrap"
              fi
            else
              echo "::warning::No non-root console GUI user found; running xcodebuild in current bootstrap"
            fi
          fi

          if [ "$TEST_TARGET" = "cmuxTests" ]; then
            XCODEBUILD_CMD=(
              scripts/ci/run-in-console-session.sh
              scripts/ci/run-app-host-xcodebuild.sh
              -project cmux.xcodeproj -scheme cmux-unit -configuration Debug
              -derivedDataPath "$CMUX_DERIVED_DATA_PATH"
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR"
              -disableAutomaticPackageResolution
              -destination "platform=macOS"
              -maximum-test-execution-time-allowance "$TEST_TIMEOUT"
              "$ONLY_TESTING"
              CMUX_SKIP_ZIG_BUILD=1
              test
            )
          else
            XCODEBUILD_CMD=(
              xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug
              -derivedDataPath "$CMUX_DERIVED_DATA_PATH"
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR"
              -disableAutomaticPackageResolution
              -destination "platform=macOS"
              -maximum-test-execution-time-allowance "$TEST_TIMEOUT"
              "$ONLY_TESTING"
              test
            )
          fi

          set +e
          # Stream xcodebuild output into the live job log (and a file for the
          # summary parsing below). The previous buffered capture lost all
          # build/test output whenever the job hit its timeout mid-run.
          "${RUN_XCODEBUILD[@]}" "${XCODEBUILD_CMD[@]}" 2>&1 | tee /tmp/xcodebuild-e2e.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          OUTPUT=$(cat /tmp/xcodebuild-e2e.log)

          # Save summary for the issue
          SUMMARY=$(echo "$OUTPUT" | grep -E "(Test Suite|Executed|FAIL|PASS)" | tail -20)
          {
            echo "test_summary<<EOFSUM"
            echo "$SUMMARY"
            echo "EOFSUM"
          } >> "$GITHUB_OUTPUT"

          EXECUTED_TESTS=$(python3 - /tmp/xcodebuild-e2e.log <<'PY'
          import re
          import sys

          log_path = sys.argv[1]
          with open(log_path, "r", encoding="utf-8", errors="replace") as handle:
              text = handle.read()

          # XCTest summaries ("Executed N tests") and Swift Testing run summaries
          # ("Test run with N tests ...") are independent per-framework counts in
          # one xcodebuild invocation; a filter can select a suite living in either.
          xctest = [int(value) for value in re.findall(r"Executed\s+(\d+)\s+tests?\b", text)]
          swift_testing = [int(value) for value in re.findall(r"Test run with\s+(\d+)\s+tests?\b", text)]
          counts = []
          if xctest:
              counts.append(xctest[-1])
          if swift_testing:
              counts.append(swift_testing[-1])
          if counts:
              print(max(counts))
          PY
          )

          if [ -z "$EXECUTED_TESTS" ]; then
            echo "::error::Could not determine executed test count for $TEST_SELECTOR from xcodebuild output"
            echo "test_result=failed" >> "$GITHUB_OUTPUT"
            {
              echo "test_output<<EOFOUT"
              echo "$OUTPUT" | tail -200
              echo "EOFOUT"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Executed tests for $TEST_SELECTOR: $EXECUTED_TESTS"
          if [ "$EXECUTED_TESTS" -eq 0 ]; then
            echo "::error::test_filter '$TEST_FILTER' resolved to target '$TEST_TARGET' selector '$TEST_SELECTOR' but xcodebuild executed 0 tests"
            echo "test_result=failed" >> "$GITHUB_OUTPUT"
            {
              echo "test_output<<EOFOUT"
              echo "$OUTPUT" | tail -200
              echo "EOFOUT"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "test_result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "test_result=failed" >> "$GITHUB_OUTPUT"
            # Save full output for the issue body
            {
              echo "test_output<<EOFOUT"
              echo "$OUTPUT" | tail -200
              echo "EOFOUT"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Stop recording and trim
        if: ${{ always() && steps.filter.outputs.record_video == 'true' && env.RECORD_PID != '' }}
        run: |
          # Stop frame capture, then assemble the independent images into a
          # video. This avoids holding an AVFoundation display session while
          # XCTest foregrounds and relaunches the app.
          kill -TERM "$RECORD_PID" 2>/dev/null || true
          for i in $(seq 1 15); do
            if ! kill -0 "$RECORD_PID" 2>/dev/null; then
              echo "Recording stopped after ${i}s"
              break
            fi
            sleep 1
          done
          kill -9 "$RECORD_PID" 2>/dev/null || true

          FRAME_COUNT="$(find /tmp/test-recording-frames -type f -name 'frame-*.jpg' 2>/dev/null | wc -l | tr -d ' ')"
          echo "Captured frames: ${FRAME_COUNT:-0}"
          if [ "${FRAME_COUNT:-0}" -eq 0 ]; then
            echo "No recording frames"
            cat /tmp/screencapture.log 2>/dev/null || true
            exit 1
          fi

          ffmpeg -y -framerate 2 -i /tmp/test-recording-frames/frame-%06d.jpg \
            -c:v libx264 -preset ultrafast -pix_fmt yuv420p \
            /tmp/test-recording-raw.mp4 2>/dev/null

          echo "=== raw recording ==="
          ls -lh /tmp/test-recording-raw.mp4

          # Trim: detect first non-black frame and cut from there
          BLACK_END=$(ffmpeg -i /tmp/test-recording-raw.mp4 \
            -vf "blackdetect=d=0.3:pic_th=0.95:pix_th=0.1" \
            -an -f null - 2>&1 \
            | grep "black_end" | tail -1 \
            | sed 's/.*black_end:\([0-9.]*\).*/\1/' || true)

          if [ -n "$BLACK_END" ] && [ "$BLACK_END" != "0" ]; then
            echo "Trimming ${BLACK_END}s of black frames from start"
            ffmpeg -y -i /tmp/test-recording-raw.mp4 -ss "$BLACK_END" \
              -c:v libx264 -preset ultrafast -pix_fmt yuv420p \
              /tmp/test-recording.mp4 2>/dev/null
          else
            echo "No black frames detected, using raw recording"
            mv /tmp/test-recording-raw.mp4 /tmp/test-recording.mp4
          fi

          echo "=== final recording ==="
          ls -lh /tmp/test-recording.mp4
          # Print duration
          ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 /tmp/test-recording.mp4 2>/dev/null \
            | xargs -I{} echo "Duration: {}s"

      - name: Upload recording artifact
        if: ${{ always() && steps.filter.outputs.record_video == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-recording
          path: /tmp/test-recording.mp4
          if-no-files-found: warn

      - name: Post results to cmux-dev-artifacts
        if: always()
        env:
          GH_TOKEN: ${{ secrets.DEV_ARTIFACTS_TOKEN }}
          TEST_RESULT: ${{ steps.tests.outputs.test_result || 'failed' }}
          TEST_SUMMARY: ${{ steps.tests.outputs.test_summary }}
          TEST_OUTPUT: ${{ steps.tests.outputs.test_output }}
          TEST_FILTER: ${{ inputs.test_filter }}
          COMMIT_SHA: ${{ steps.sha.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
          RECORD_VIDEO: ${{ steps.filter.outputs.record_video }}
        run: |
          set -euo pipefail

          LABEL="$TEST_RESULT"
          if [ "$TEST_RESULT" = "passed" ]; then
            STATUS_EMOJI="PASSED"
          else
            STATUS_EMOJI="FAILED"
          fi

          REF_DISPLAY="${{ inputs.ref || github.ref_name }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/$RUN_ID"
          ARTIFACT_URL="$RUN_URL#artifacts"

          BODY="**Status:** $STATUS_EMOJI
          **Ref:** \`$REF_DISPLAY\`
          **SHA:** [\`${COMMIT_SHA:0:12}\`](https://github.com/${{ github.repository }}/commit/$COMMIT_SHA)
          **Test:** \`$TEST_FILTER\`
          **Workflow run:** $RUN_URL"

          if [ "$RECORD_VIDEO" = "true" ]; then
            BODY="$BODY
          **Recording:** [Download from artifacts]($ARTIFACT_URL)"
          fi

          if [ -n "$TEST_OUTPUT" ]; then
            BODY="$BODY

          <details><summary>Test output (last 200 lines)</summary>

          \`\`\`
          $TEST_OUTPUT
          \`\`\`

          </details>"
          fi

          if [ -n "$TEST_SUMMARY" ]; then
            BODY="$BODY

          \`\`\`
          $TEST_SUMMARY
          \`\`\`"
          fi

          ISSUE_URL=$(gh issue create \
            --repo manaflow-ai/cmux-dev-artifacts \
            --title "[$STATUS_EMOJI] $TEST_FILTER @ ${COMMIT_SHA:0:7} ($REF_DISPLAY)" \
            --body "$BODY" \
            --label "$LABEL")

          echo "Issue posted: $ISSUE_URL"
          echo "::notice title=Test Result Issue::$ISSUE_URL"

      - name: Clean owned DerivedData
        if: always()
        run: |
          set -euo pipefail
          derived_data_path="${CMUX_DERIVED_DATA_PATH:-}"
          case "$derived_data_path" in
            "$RUNNER_TEMP"/cmux-derived-data-e2e-*)
              rm -rf -- "$derived_data_path"
              ;;
            "")
              echo "DerivedData was not prepared; nothing to clean"
              ;;
            *)
              echo "::error::refusing to remove unowned DerivedData path: $derived_data_path"
              exit 1
              ;;
          esac
