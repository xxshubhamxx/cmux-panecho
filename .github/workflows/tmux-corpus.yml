name: tmux corpus

on:
  pull_request:
    paths:
      - ".github/workflows/tmux-corpus.yml"
      - "daemon/remote/**"
  workflow_dispatch:
    inputs:
      fuzztime:
        description: Time per Go fuzz target
        required: false
        default: 2m
  schedule:
    - cron: "17 10 * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  remote-daemon-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: daemon/remote/go.mod
          cache-dependency-path: daemon/remote/go.sum

      - name: Run deterministic tmux corpus tests
        working-directory: daemon/remote
        run: go test ./...

      - name: Run tmux corpus fuzz targets
        working-directory: daemon/remote
        env:
          FUZZTIME: ${{ github.event_name == 'pull_request' && '30s' || github.event.inputs.fuzztime || '2m' }}
        run: |
          set -euo pipefail
          for target in \
            FuzzTmuxCompatArgParser \
            FuzzTmuxRenderFormatSupportedSubset \
            FuzzTmuxSendKeysTokens \
            FuzzConsumeWebSocketLease \
            FuzzNormalizePTYSize \
            FuzzWebSocketPTYControlFrame
          do
            go test ./cmd/cmuxd-remote -run '^$' -fuzz "^${target}$" -fuzztime "$FUZZTIME"
          done

  terminal-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    timeout-minutes: 30
    env:
      # XCTest app-host crashes can leave xcodebuild waiting in Swift's crash
      # backtracer until the job timeout. Keep crash handling non-interactive
      # and cheap so xcodebuild can restart/finish the suite.
      SWIFT_BACKTRACE: "interactive=no,timeout=0s,symbolicate=off,color=no"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(
              find /Applications -maxdepth 1 -name 'Xcode*.app' -print 2>/dev/null \
                | sort \
                | tail -n 1 \
                || true
            )"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty/**') }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: ./scripts/install-rust-ci.sh

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: tmux-corpus-spm-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: tmux-corpus-spm-

      - name: Prepare isolated DerivedData
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="${RUNNER_TEMP}/cmux-derived-data-tmux-corpus-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$DERIVED_DATA_PATH"
          mkdir -p "$DERIVED_DATA_PATH"
          echo "CMUX_DERIVED_DATA_PATH=$DERIVED_DATA_PATH" >> "$GITHUB_ENV"

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"
          xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
            -derivedDataPath "$CMUX_DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -resolvePackageDependencies

      - name: Run terminal corpus unit tests
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          set +e
          scripts/ci/xcodebuild_noninteractive.py \
            xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -derivedDataPath "$CMUX_DERIVED_DATA_PATH" \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" \
              -only-testing:cmuxTests/GhosttyCommandShiftForwardingTests \
              -only-testing:cmuxTests/GhosttyTerminalStartupEnvironmentTests \
              -only-testing:cmuxTests/CmuxConfigNamedColorTests \
              -only-testing:cmuxTests/SessionPersistenceTests \
              test 2>&1 | tee /tmp/tmux-terminal-corpus-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          OUTPUT=$(cat /tmp/tmux-terminal-corpus-output.txt)
          set -e

          if [ "$EXIT_CODE" -ne 0 ]; then
            SUMMARY=$(echo "$OUTPUT" | grep "Executed.*tests.*with.*failures" | tail -1 || true)
            if echo "$SUMMARY" | grep -q "(0 unexpected)"; then
              echo "All failures are expected, treating as pass"
            else
              echo "Unexpected terminal corpus test failures detected"
              exit 1
            fi
          fi
