name: cmux-tui publish pypi

on:
  workflow_dispatch:
    inputs:
      version:
        description: "TUI package version to publish, for example 0.1.0"
        required: true
        type: string

permissions: {}

concurrency:
  group: tui-publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: validate release source
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    permissions:
      contents: read
    outputs:
      release_sha: ${{ steps.release.outputs.release_sha }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Require protected main and resolve release tag
        id: release
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$DISPATCH_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "workflow_dispatch version must match X.Y.Z" >&2
            exit 1
          }
          git fetch --force origin main --tags
          tag="cmux-tui-v$DISPATCH_VERSION"
          expected_ref="refs/tags/$tag"
          if [[ "$GITHUB_REF" != "$expected_ref" ]]; then
            echo "Refusing to publish PyPI from $GITHUB_REF; dispatch this workflow on $expected_ref." >&2
            exit 1
          fi
          release_sha="$(git rev-parse "refs/tags/$tag^{commit}")" || {
            echo "release tag does not exist: $tag" >&2
            exit 1
          }
          git merge-base --is-ancestor "$release_sha" origin/main || {
            echo "release tag $tag is not an ancestor of protected main" >&2
            exit 1
          }
          if [[ "$release_sha" != "$GITHUB_SHA" ]]; then
            echo "release tag $tag resolves to $release_sha, but package provenance would identify workflow commit $GITHUB_SHA" >&2
            echo "Dispatch from main only while the release tag points at the current main commit." >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "release_sha=$release_sha"
          } >> "$GITHUB_OUTPUT"

  build-package:
    needs: validate-version
    permissions:
      contents: read
    uses: ./.github/workflows/cmux-tui-build-package.yml
    with:
      version: ${{ inputs.version }}
      package_npm: false
      package_pypi: true
      include_windows: false
      checkout_ref: ${{ needs.validate-version.outputs.release_sha }}

  publish:
    needs: build-package
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-tui
      url: https://pypi.org/p/cmux
    steps:
      - name: Download PyPI wheels
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: pypi-wheels
          path: dist

      - name: Trusted publisher setup note
        run: |
          cat <<'EOF'
          PyPI Trusted Publisher required:
          - Project: cmux
          - Repository: manaflow-ai/cmux
          - Workflow: tui-publish-pypi.yml
          - Environment: pypi-tui
          EOF

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
          attestations: true
