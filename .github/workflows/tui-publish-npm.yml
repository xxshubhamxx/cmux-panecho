name: cmux-tui publish npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "TUI package version to publish, for example 0.1.0"
        required: true
        type: string
      confirm_tui_cmux:
        description: "Set true only for the coordinated npm cmux TUI publish"
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: tui-publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    # This workflow's launcher publish deliberately omits --tag so the version
    # becomes npm `latest`. Only strict stable X.Y.Z may go through here; a
    # nightly-form version on latest would put a nightly in front of every
    # `npx cmux` user (nightlies publish via cmux-tui-nightly.yml with --tag nightly).
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release_sha: ${{ steps.release.outputs.release_sha }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Require protected main and resolve release tag
        id: release
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$DISPATCH_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "workflow_dispatch version must match stable X.Y.Z (no prerelease); nightlies go through cmux-tui-nightly.yml" >&2
            exit 1
          }
          git fetch --force origin main --tags
          tag="cmux-tui-v$DISPATCH_VERSION"
          expected_ref="refs/tags/$tag"
          if [[ "$GITHUB_REF" != "$expected_ref" ]]; then
            echo "Refusing to publish npm from $GITHUB_REF; dispatch this workflow on $expected_ref." >&2
            exit 1
          fi
          release_sha="$(git rev-parse "refs/tags/$tag^{commit}")" || {
            echo "release tag does not exist: $tag" >&2
            exit 1
          }
          git merge-base --is-ancestor "$release_sha" origin/main || {
            echo "release tag $tag is not an ancestor of protected main" >&2
            exit 1
          }
          if [[ "$release_sha" != "$GITHUB_SHA" ]]; then
            echo "release tag $tag resolves to $release_sha, but npm provenance would identify workflow commit $GITHUB_SHA" >&2
            echo "Dispatch from main only while the release tag points at the current main commit." >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "release_sha=$release_sha"
          } >> "$GITHUB_OUTPUT"

  build-package:
    needs: validate-version
    permissions:
      contents: read
    uses: ./.github/workflows/cmux-tui-build-package.yml
    with:
      version: ${{ inputs.version }}
      package_npm: true
      package_pypi: false
      include_windows: false
      checkout_ref: ${{ needs.validate-version.outputs.release_sha }}

  publish:
    needs:
      - validate-version
      - build-package
    runs-on: ubuntu-latest # github-hosted-required: npm provenance needs a github-hosted runner
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm-tui
      url: https://www.npmjs.com/package/cmux
    steps:
      - name: Require npm cmux confirmation
        if: inputs.confirm_tui_cmux != true
        run: |
          echo "Refusing to publish npm package cmux for the TUI without confirm_tui_cmux=true." >&2
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.validate-version.outputs.release_sha }}

      - name: Download npm package directories
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: npm-packages
          path: dist

      - name: Restore npm package executable modes
        run: |
          python3 cmux-tui/dist/scripts/package_npm_artifact.py extract \
            --archive dist/npm-packages.tar.gz \
            --out dist

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"
          registry-url: https://registry.npmjs.org

      - name: Install npm with OIDC support
        run: npm install -g npm@11.5.1

      - name: Publish platform packages
        run: |
          set -euo pipefail
          packages=(
            cmux-tui-darwin-arm64
            cmux-tui-darwin-x64
            cmux-tui-linux-x64
            cmux-tui-linux-arm64
          )
          for package in "${packages[@]}"; do
            echo "Publishing $package"
            if ! npm publish --provenance "dist/npm-packages/$package"; then
              cat >&2 <<'EOF'
          npm publish failed.

          For the first publish of the new TUI platform package names, add npm Trusted Publishers for:
          - cmux-tui-darwin-arm64
          - cmux-tui-darwin-x64
          - cmux-tui-linux-x64
          - cmux-tui-linux-arm64

          Trusted publisher settings for each package:
          - Repository: manaflow-ai/cmux
          - Workflow: tui-publish-npm.yml
          - Environment: npm-tui
          EOF
              exit 1
            fi
          done

      - name: Publish launcher package
        run: |
          set -euo pipefail
          # Deliberately do not pass --tag: this coordinated TUI publish takes
          # over the cmux latest dist-tag from the old 0.8.3 CLI when version > 0.8.3.
          npm publish --provenance dist/npm-packages/cmux
