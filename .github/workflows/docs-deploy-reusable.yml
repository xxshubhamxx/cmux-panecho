name: Deploy docs channel reusable

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
    secrets:
      vercel_org_id:
        required: true
      vercel_project_id:
        required: true
      vercel_token:
        required: true

jobs:
  deploy:
    permissions:
      contents: read
    runs-on: ${{ vars.LINUX_RUNNER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          # Vercel reloads config from the linked project's web root.
          cp web/vercel.docs-channel.json web/vercel.json
          bunx vercel@56.3.1 deploy --prod --yes \
            --build-env "CMUX_DOCS_CHANNEL=$DOCS_CHANNEL" \
            --env "CMUX_DOCS_CHANNEL=$DOCS_CHANNEL"
        env:
          DOCS_CHANNEL: ${{ inputs.channel }}
          VERCEL_ORG_ID: ${{ secrets.vercel_org_id }}
          VERCEL_PROJECT_ID: ${{ secrets.vercel_project_id }}
          VERCEL_TOKEN: ${{ secrets.vercel_token }}
