name: iOS simulator tests

on:
  # Temporarily manual-only beginning 2026-07-13 to pause automatic CI.
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      test_filter:
        description: "UI test class or class/method, for example cmuxUITests/testSignInPairingAndWorkspaceShell"
        required: false
        default: ""
      device_family:
        description: "Simulator family"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - iphone
          - ipad
      runner:
        description: "macOS runner (auto follows MACOS_RUNNER_IOS; tart-ios uses the isolated VM fleet)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - blacksmith-6vcpu-macos-26
          - tart-ios

permissions:
  contents: read

jobs:
  detect-ios-changes:
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      should_lint: ${{ steps.detect.outputs.should_lint }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Detect iOS changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "should_lint=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_MERGE_BASE="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"
          git diff --name-only "$BASE_MERGE_BASE" "$HEAD_SHA" > /tmp/changed-files.txt
          if grep -Eq '^(ios/|Packages/Shared/|Packages/iOS/|Sources/Mobile/|vendor/stack-auth-swift-sdk-prerelease/|scripts/lint-ios-package-conventions\.sh$)' /tmp/changed-files.txt; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No iOS-owned files changed; skipping iOS tests."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
          # The conventions lint (free-function ban, namespace-type rule, ...)
          # covers every package, so it runs for any Packages/ change too.
          if grep -Eq '^(ios/|Packages/|Sources/Mobile/|vendor/stack-auth-swift-sdk-prerelease/|scripts/lint-ios-package-conventions\.sh$|scripts/lint-namespace-types-baseline\.txt$)' /tmp/changed-files.txt; then
            echo "should_lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "No package-owned files changed; skipping conventions lint."
            echo "should_lint=false" >> "$GITHUB_OUTPUT"
          fi

  package-conventions-lint:
    needs: detect-ios-changes
    if: ${{ needs.detect-ios-changes.outputs.should_lint == 'true' }}
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
          submodules: false

      - name: Lint iOS package conventions
        run: |
          # Mechanical enforcement of the modular-refactor conventions over the
          # iOS line (no singletons / Combine / locks / timer hacks / KVO /
          # namespace-enums) plus the repo-wide namespace-type rule (no
          # all-static "namespace" types in any package). Exits non-zero on any
          # unjustified ERROR; sanctioned exceptions carry a lint:allow /
          # TRANSITIONAL / carve-out marker, and pre-existing namespace-type
          # debt is grandfathered in scripts/lint-namespace-types-baseline.txt.
          ./scripts/lint-ios-package-conventions.sh

  mobile-core-package:
    needs: detect-ios-changes
    if: ${{ needs.detect-ios-changes.outputs.should_run == 'true' }}
    runs-on: ${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_IOS || 'blacksmith-6vcpu-macos-26') || inputs.runner }}
    timeout-minutes: 10
    steps:
      - name: Validate Tart runner identity
        if: ${{ startsWith((!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_IOS || 'blacksmith-6vcpu-macos-26') || inputs.runner, 'tart-') }}
        env:
          RUNNER_CONTEXT_NAME: ${{ runner.name }}
        run: |
          set -euo pipefail
          [[ "$RUNNER_CONTEXT_NAME" == tart-cmux-* ]] || {
            echo "::error::tart-ios resolved to unexpected runner $RUNNER_CONTEXT_NAME"
            exit 1
          }
          test -f /etc/cmux-tart-ci || {
            echo "::error::tart-ios runner is missing the immutable VM identity marker"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
          submodules: false

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' -print 2>/dev/null | sort | tail -n 1 || true)"
            if [ -z "$XCODE_APP" ]; then
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
            XCODE_DIR="$XCODE_APP/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Run CMUXMobileCore package tests
        run: |
          swift test --package-path Packages/Shared/CMUXMobileCore

      - name: Run CmuxSyncStore package tests
        run: |
          # Local-first sync store (raw SQLite3). Headless SwiftPM, no GhosttyKit
          # or app-target dependency, so it runs as a real CI gate here.
          swift test --package-path Packages/Shared/CmuxSyncStore

      - name: Run CmuxMobilePairedMac package tests
        run: |
          swift test --package-path Packages/iOS/CmuxMobilePairedMac

      - name: Run CmuxMobileShell package tests
        run: |
          # iOS shell replay/liveness regressions live in this package target.
          # Keep them under the iOS package gate so PR CI enforces the mobile
          # terminal mirror behavior without relying on local-only SwiftPM runs.
          swift test --package-path Packages/iOS/CmuxMobileShell

  ios-simulator:
    needs: detect-ios-changes
    if: ${{ needs.detect-ios-changes.outputs.should_run == 'true' }}
    # Blacksmith, not the bare `macos-26` label (which our self-hosted fleet
    # carries). iOS simulator XCTest runs inside the Simulator, not as a
    # foregrounded Mac app, so the Blacksmith macOS foreground limitation that
    # blocks macOS app-host XCTest does not apply here; this lane is verified
    # green on blacksmith-6vcpu-macos-26.
    runs-on: ${{ (!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_IOS || 'blacksmith-6vcpu-macos-26') || inputs.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        family: [iphone, ipad]
    steps:
      - name: Validate Tart runner identity
        if: ${{ startsWith((!inputs.runner || inputs.runner == 'auto') && (vars.MACOS_RUNNER_IOS || 'blacksmith-6vcpu-macos-26') || inputs.runner, 'tart-') && !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        env:
          RUNNER_CONTEXT_NAME: ${{ runner.name }}
        run: |
          set -euo pipefail
          [[ "$RUNNER_CONTEXT_NAME" == tart-cmux-* ]] || {
            echo "::error::tart-ios resolved to unexpected runner $RUNNER_CONTEXT_NAME"
            exit 1
          }
          test -f /etc/cmux-tart-ci || {
            echo "::error::tart-ios runner is missing the immutable VM identity marker"
            exit 1
          }

      - name: Skip unrequested family
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family }}
        run: |
          echo "Skipping ${{ matrix.family }}"

      - name: Checkout
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
          submodules: recursive

      - name: Select Xcode
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' -print 2>/dev/null | sort | tail -n 1 || true)"
            if [ -z "$XCODE_APP" ]; then
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
            XCODE_DIR="$XCODE_APP/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Install zig
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: ./scripts/install-zig-ci.sh

      - name: Ensure iOS simulator runtime
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: |
          set -euo pipefail
          if xcrun simctl list runtimes available | grep -Eq '\biOS\b'; then
            exit 0
          fi
          echo "No available iOS simulator runtime; downloading the iOS platform."
          xcodebuild -downloadPlatform iOS
          xcrun simctl list runtimes available | grep -Eq '\biOS\b'

      - name: Provision GhosttyKit
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: |
          # Downloads the prebuilt GhosttyKit.xcframework pinned in
          # scripts/ghosttykit-checksums.txt for the current ghostty SHA, or
          # falls back to a from-source build. The iOS app links GhosttyKit via
          # a local-path binaryTarget, so it must exist before package resolve.
          ./scripts/ensure-ghosttykit.sh

      - name: Pick simulator
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        env:
          DEVICE_FAMILY: ${{ matrix.family }}
        run: |
          set -euo pipefail
          SIMULATOR_ENV="${RUNNER_TEMP:-$PWD/.tmp}/simulator-${DEVICE_FAMILY}.env"
          mkdir -p "$(dirname "$SIMULATOR_ENV")"
          python3 - <<'PY' > "$SIMULATOR_ENV"
          import json
          import os
          import subprocess
          import sys

          def simctl_json(*args):
              return json.loads(subprocess.check_output(["xcrun", "simctl", "list", *args, "-j"]))

          def version_key(runtime):
              raw = str(runtime.get("version") or "")
              parts = []
              for part in raw.split("."):
                  try:
                      parts.append(int(part))
                  except ValueError:
                      parts.append(0)
              return tuple(parts)

          family = os.environ["DEVICE_FAMILY"]
          data = simctl_json("devices", "available")
          devices = [
              device
              for runtimes in data.get("devices", {}).values()
              for device in runtimes
              if device.get("isAvailable", True)
          ]
          prefix = "iPad" if family == "ipad" else "iPhone"
          preferred = ["iPad Pro 13-inch (M4)", "iPad Air 13-inch (M3)"] if family == "ipad" else ["iPhone 17", "iPhone 16"]
          selected = next((d for name in preferred for d in devices if d.get("name") == name), None)
          selected = selected or next((d for d in devices if d.get("name", "").startswith(prefix)), None)
          if selected is None:
              runtimes = [
                  runtime
                  for runtime in simctl_json("runtimes").get("runtimes", [])
                  if runtime.get("isAvailable", True)
                  and (
                      runtime.get("platform") == "iOS"
                      or "iOS" in runtime.get("name", "")
                      or runtime.get("identifier", "").startswith("com.apple.CoreSimulator.SimRuntime.iOS")
                  )
              ]
              device_types = [
                  device_type
                  for device_type in simctl_json("devicetypes").get("devicetypes", [])
                  if device_type.get("name", "").startswith(prefix)
              ]
              runtime = max(runtimes, key=version_key, default=None)
              device_type = next((d for name in preferred for d in device_types if d.get("name") == name), None)
              device_type = device_type or (device_types[-1] if device_types else None)
              if runtime is None or device_type is None:
                  raise SystemExit(f"No available {family} simulator or creatable iOS runtime/device type found")
              created_name = f"cmux CI {device_type['name']}"
              udid = subprocess.check_output([
                  "xcrun",
                  "simctl",
                  "create",
                  created_name,
                  device_type["identifier"],
                  runtime["identifier"],
              ], text=True).strip()
              selected = {"udid": udid, "name": created_name}
              print(
                  f"Created {selected['name']} ({udid}) with {runtime['identifier']}",
                  file=sys.stderr,
              )
          print(f"SIMULATOR_ID={selected['udid']}")
          print(f"SIMULATOR_NAME={selected['name']}")
          PY
          cat "$SIMULATOR_ENV"
          cat "$SIMULATOR_ENV" >> "$GITHUB_ENV"

      - name: Prepare iOS build paths
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        env:
          DEVICE_FAMILY: ${{ matrix.family }}
        run: |
          set -euo pipefail
          IOS_DERIVED_DATA="${RUNNER_TEMP:-$PWD/.tmp}/cmux-ios-${DEVICE_FAMILY}"
          rm -rf "$IOS_DERIVED_DATA"
          mkdir -p "$IOS_DERIVED_DATA/logs"
          echo "IOS_DERIVED_DATA=$IOS_DERIVED_DATA" >> "$GITHUB_ENV"

      - name: Resolve packages
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: |
          xcodebuild -workspace ios/cmux.xcworkspace \
            -scheme cmux-ios \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -derivedDataPath "$IOS_DERIVED_DATA" \
            -resolvePackageDependencies

      - name: Run iOS simulator tests
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        env:
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          set -euo pipefail
          XCODEBUILD_ARGS=(
            -workspace ios/cmux.xcworkspace
            -scheme cmux-ios
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID"
            -derivedDataPath "$IOS_DERIVED_DATA"
          )
          if [ -n "${TEST_FILTER:-}" ]; then
            XCODEBUILD_ARGS+=(-only-testing:"$TEST_FILTER")
          else
            # Full UI tests currently exceed the pull-request simulator budget
            # on macos-26. Keep them runnable via workflow_dispatch +
            # test_filter, while the PR lane still builds the app and runs
            # non-UI iOS tests.
            XCODEBUILD_ARGS+=(-skip-testing:cmuxUITests)
          fi
          XCODEBUILD_ARGS+=(test)
          selected_tests_passed_despite_xcodebuild_status() {
            local log_path="$1"
            # The negative grep must catch BOTH XCTest failure output and Swift
            # Testing failure output (✘ markers): the final "Failing tests:"
            # section is not always flushed into the tee'd log, and without the
            # ✘ patterns a real Swift Testing failure exiting 65 was
            # misclassified as a runner cleanup failure and turned the job green.
            grep -Eq "Test Suite 'Selected tests' passed|Test Suite 'cmuxUITests' passed" "$log_path" &&
              grep -Eq "Executed [1-9][0-9]* tests, with 0 failures \\(0 unexpected\\)" "$log_path" &&
              ! grep -Eq "Test Suite '.*' failed|Test Case '.*' failed|Assertion Failure|Failing tests:|with [1-9][0-9]* failures|with [0-9]+ failures \\([1-9][0-9]* unexpected\\)|✘ Test|✘ Suite" "$log_path"
          }
          for attempt in 1 2; do
            LOG_PATH="$IOS_DERIVED_DATA/logs/attempt-${attempt}.log"
            echo "Preparing $SIMULATOR_NAME ($SIMULATOR_ID), attempt $attempt"
            xcrun simctl shutdown "$SIMULATOR_ID" >/dev/null 2>&1 || true
            xcrun simctl erase "$SIMULATOR_ID"
            xcrun simctl boot "$SIMULATOR_ID" >/dev/null 2>&1 || true
            xcrun simctl bootstatus "$SIMULATOR_ID" -b
            if xcodebuild "${XCODEBUILD_ARGS[@]}" 2>&1 | tee "$LOG_PATH"; then
              exit 0
            fi
            status="${PIPESTATUS[0]}"
            if selected_tests_passed_despite_xcodebuild_status "$LOG_PATH"; then
              echo "xcodebuild exited $status after XCTest reported the selected tests passed with zero failures; treating this as a runner cleanup failure."
              exit 0
            fi
            if [ "$attempt" -lt 2 ] && grep -Eq "Timed out while launching application via Xcode|Failed to send signal 19|DTXMessage" "$LOG_PATH"; then
              echo "Detected Xcode simulator launch failure, retrying on a clean simulator."
              continue
            fi
            exit "$status"
          done

  ios-tests:
    name: ios-tests
    # Aggregate gate for this workflow's iOS suites. Add this check to the branch
    # protection required list (it is the iOS sibling of ci.yml's "tests" gate).
    # References each suite by job KEY via needs:, so renaming or sharding a job
    # never desyncs the required-checks list. Add new iOS jobs to needs: here.
    needs:
      - detect-ios-changes
      - package-conventions-lint
      - mobile-core-package
      - ios-simulator
    if: ${{ always() }}
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 5
    steps:
      - name: Check iOS test routing
        env:
          IOS_NEEDS: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["IOS_NEEDS"])

          # The routing job must succeed for its should_run/should_lint outputs to
          # be trustworthy; the suites below run or skip based on those outputs.
          if needs["detect-ios-changes"]["result"] != "success":
              print(f"detect-ios-changes: {needs['detect-ios-changes']['result']}", file=sys.stderr)
              sys.exit(1)

          # A suite that opted out via the routing filter reports "skipped", which
          # is fine; a suite that actually ran and failed must block the merge.
          allowed = {"success", "skipped"}
          bad = {
              name: data["result"]
              for name, data in sorted(needs.items())
              if name != "detect-ios-changes" and data["result"] not in allowed
          }
          if bad:
              for name, result in bad.items():
                  print(f"{name} did not pass: {result}", file=sys.stderr)
              sys.exit(1)

          for name, data in sorted(needs.items()):
              print(f"{name}={data['result']}")
          PY
