name: iOS App Store (prod upload)

on:
  # Dispatch only. Unlike the beta lane (ios-testflight.yml) there is NO schedule:
  # public App Store builds are cut deliberately, one per intended submission, not
  # on a rolling timer. The build is uploaded to the com.cmux.app record's
  # TestFlight; you then attach it to the App Store version and submit manually.
  workflow_dispatch:
    inputs:
      marketing_version:
        description: >-
          CFBundleShortVersionString to stamp (must match the ASC App Store
          version's train, e.g. 1.0, so the build is attachable).
        required: false
        default: "1.0"
      build_number:
        description: CFBundleVersion to stamp (defaults to UTC yyyyMMddHHmmss)
        required: false
        default: ""

concurrency:
  # Serialize prod uploads so parallel archives never race on the timestamp build
  # number. Queue rather than cancel so no requested upload is lost.
  group: ios-appstore-upload-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload:
    name: Upload to App Store Connect (com.cmux.app)
    # Only ever publish from main: the ASC secrets ship reviewed main, and a
    # dispatch against a feature branch must not upload arbitrary code.
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ vars.MACOS_RUNNER_IOS || 'blacksmith-6vcpu-macos-26' }}
    timeout-minutes: 60
    env:
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' -print 2>/dev/null | sort | tail -n 1 || true)"
            if [ -z "$XCODE_APP" ]; then
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
            XCODE_DIR="$XCODE_APP/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Install zig
        run: ./scripts/install-zig-ci.sh

      - name: Provision GhosttyKit
        run: ./scripts/ensure-ghosttykit.sh

      - name: Materialize App Store Connect API key
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_API_KEY_ID:-}" ] || [ -z "${ASC_API_ISSUER_ID:-}" ] || [ -z "${ASC_API_KEY_P8_BASE64:-}" ]; then
            echo "Missing one of ASC_API_KEY_ID / ASC_API_ISSUER_ID / ASC_API_KEY_P8_BASE64 secrets" >&2
            exit 1
          fi
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$KEY_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          mkdir -p "$KEY_DIR"
          printf '%s' "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "ASC_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Import iOS distribution signing cert
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_DISTRIBUTION_CERTIFICATE_BASE64:-}" ]; then
            echo "Missing IOS_DISTRIBUTION_CERTIFICATE_BASE64 secret" >&2
            exit 1
          fi
          if [ -z "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing IOS_DISTRIBUTION_CERTIFICATE_PASSWORD secret" >&2
            exit 1
          fi

          KEYCHAIN_PASSWORD="$(uuidgen)"
          KEYCHAIN_NAME="ios-appstore.keychain"
          CERT_PATH="$RUNNER_TEMP/ios-distribution.p12"
          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security delete-keychain "$KEYCHAIN_NAME" >/dev/null 2>&1 || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import "$CERT_PATH" -k "$KEYCHAIN_NAME" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME"
          security find-identity -v -p codesigning "$KEYCHAIN_NAME"
          IOS_DISTRIBUTION_IDENTITY="$(
            security find-identity -v -p codesigning "$KEYCHAIN_NAME" |
              sed -n 's/.*"\(Apple Distribution: .* (7WLXT3NR37)\)".*/\1/p' |
              head -n 1
          )"
          if [ -z "$IOS_DISTRIBUTION_IDENTITY" ]; then
            echo "No Apple Distribution identity for team 7WLXT3NR37 was found in the imported certificate" >&2
            exit 1
          fi
          echo "IOS_DISTRIBUTION_IDENTITY=$IOS_DISTRIBUTION_IDENTITY" >> "$GITHUB_ENV"
          echo "Using iOS distribution identity: $IOS_DISTRIBUTION_IDENTITY"

      - name: Install prod (App Store) provisioning profile
        env:
          IOS_PROD_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROD_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_PROD_PROVISIONING_PROFILE_BASE64:-}" ]; then
            echo "Missing IOS_PROD_PROVISIONING_PROFILE_BASE64 secret" >&2
            exit 1
          fi

          TMP_PROFILE="$RUNNER_TEMP/cmux-prod.mobileprovision"
          TMP_PLIST="$RUNNER_TEMP/cmux-prod-profile.plist"
          printf '%s' "$IOS_PROD_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$TMP_PROFILE"
          security cms -D -i "$TMP_PROFILE" > "$TMP_PLIST"

          APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$TMP_PLIST")"
          if [ "$APP_ID" != "7WLXT3NR37.com.cmux.app" ]; then
            echo "Prod provisioning profile targets unexpected app ID: $APP_ID" >&2
            exit 1
          fi
          APS_ENVIRONMENT="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:aps-environment" "$TMP_PLIST")"
          if [ "$APS_ENVIRONMENT" != "production" ]; then
            echo "Prod provisioning profile aps-environment is '$APS_ENVIRONMENT', expected 'production'" >&2
            exit 1
          fi
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :Name" "$TMP_PLIST")"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c "Print :UUID" "$TMP_PLIST")"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$TMP_PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "IOS_PROD_PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed prod provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Archive, export, and upload to App Store Connect
        id: upload
        env:
          INPUT_BUILD_NUMBER: ${{ github.event.inputs.build_number }}
          INPUT_MARKETING_VERSION: ${{ github.event.inputs.marketing_version }}
          CMUX_BUILD_NUMBER_OUT_FILE: ${{ runner.temp }}/cmux-final-build-number.txt
        run: |
          set -euo pipefail
          # appstore lane = com.cmux.app + "cmux Distribution" profile + display
          # name "cmux". --marketing-version pins the version train so the build
          # attaches to the matching ASC store version. --skip-notes: public App
          # Store "What's New" is edited in ASC metadata, not generated here.
          ARGS=(--lane appstore --signing manual --skip-notes)
          if [ -n "${INPUT_MARKETING_VERSION:-}" ]; then
            ARGS+=(--marketing-version "$INPUT_MARKETING_VERSION")
          fi
          if [ -n "${INPUT_BUILD_NUMBER:-}" ]; then
            ARGS+=(--build-number "$INPUT_BUILD_NUMBER")
          fi
          ./ios/scripts/upload-testflight.sh "${ARGS[@]}"
          if [ -f "$CMUX_BUILD_NUMBER_OUT_FILE" ]; then
            FINAL_BN="$(cat "$CMUX_BUILD_NUMBER_OUT_FILE")"
          else
            FINAL_BN="${INPUT_BUILD_NUMBER:-unknown}"
          fi
          echo "final_build_number=$FINAL_BN" >> "$GITHUB_OUTPUT"
          echo "Shipped CFBundleVersion: $FINAL_BN"

      - name: Summary
        if: always()
        env:
          BUILD_NUMBER: ${{ steps.upload.outputs.final_build_number || github.event.inputs.build_number || 'unknown' }}
          MARKETING_VERSION: ${{ github.event.inputs.marketing_version }}
        run: |
          {
            echo "### iOS App Store upload"
            echo
            echo "- lane: \`appstore\` (bundle id \`com.cmux.app\`, name \"cmux\")"
            echo "- signing: manual (CI-imported iOS distribution cert + prod profile)"
            echo "- marketing version (CFBundleShortVersionString): \`${MARKETING_VERSION}\`"
            echo "- build number (CFBundleVersion): \`${BUILD_NUMBER}\`"
            echo
            echo "Next: attach this build to the App Store version in App Store Connect, then submit for review manually."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain ios-appstore.keychain >/dev/null 2>&1 || true
